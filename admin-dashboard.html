<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CxE Americas Step Tracker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta http-equiv="refresh" content="0; url=./admin/dist/#/">
    <script>
        // The admin dashboard has been ported to a modern React SPA at /admin/dist/.
        // This page is retained only as a redirect stub so existing links keep working.
        // Previous versions contained a client-side auth check that relied on values
        // seeded by admin-login.html; all of that has been removed.
        try { window.location.replace('./admin/dist/#/'); } catch (_) {}
    </script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0078d4, #5c2d91);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            text-align: center;
        }
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 420px;
            width: 100%;
        }
        h1 { margin: 0 0 8px; font-size: 24px; }
        p { margin: 0; opacity: 0.9; }
        a {
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            border-radius: 8px;
            background: rgba(255,255,255,0.16);
            transition: background 0.15s ease;
        }
        a:hover { background: rgba(255,255,255,0.28); }
        .back { background: transparent; font-weight: 400; opacity: 0.7; margin-top: 12px; padding: 6px 0; }
        .back:hover { background: transparent; opacity: 1; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size:48px;margin-bottom:16px;">🛡️</div>
        <h1>Admin dashboard moved</h1>
        <p>Redirecting you to the new admin interface…</p>
        <a href="./admin/dist/#/">Continue to admin dashboard →</a><br>
        <a class="back" href="index.html">← Back to Step Tracker</a>
    </div>
</body>
</html>
